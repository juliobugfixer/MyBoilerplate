<!doctype html>
<html lang="pt-PT">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="author" content="_BugFixer" />
    <title>Tabelas</title>
    <style>
      h3,
      h1 {
        text-align: center;
      }
      div {
        margin: 10px 0 0 0;
      }
    </style>
  </head>
  <body>
    <!-- Formulários -->
    <header>
      <h1>Revisão de Conceitos HTML</h1>
    </header>

    <main>
      <section class="container">
        <h3>Formulários</h3>
        <form>
          <div>
            <label for="primeiroNome">Primeiro Nome: </label>
            <input type="text" name="primeiroNome" id="primeiroNome" required />
          </div>
          <div>
            <label for="ultimoNome">Último Nome: </label>
            <input type="text" name="ultimoNome" id="ultimoNome" required />
          </div>
          <div>
            <label for="email">Email: </label>
            <input type="email" name="email" id="email" required />
          </div>
          <div>
            <label for="contato">Contato: </label>
            <input
              type="tel"
              name="contato"
              id="contato"
              pattern="[0-9]{3} - [0-9]{3} - [0-9]{3}"
              required
            />
          </div>

          <div>
            <label for="resumoProfissional">Resumo Profissional: </label>
            <textarea
              name="resumoProfissional"
              id="resumoProfissional"
              rows="1"
              cols="30"
              required
            ></textarea>
          </div>

          <!-- Radio -->
          <div>
            <input type="radio" name="linguagens" id="html" value="HTML" />
            <label for="linguagem">HTML</label>
            <input type="radio" name="linguagens" id="css" value="CSS" />
            <label for="linguagem">CSS</label>
            <input
              type="radio"
              name="linguagens"
              id="javascript"
              value="Javascript"
            />
            <label for="linguagem">Javascript</label>
          </div>

          <div>
            <!-- Checkbox -->
            <input
              type="checkbox"
              name="primeira_area"
              id="primeiraArea"
              value="Back-end"
            />
            <label for="primeiraArea">Back-end</label>
            <input
              type="checkbox"
              name="segunda_area"
              id="segundaArea"
              value="Front-end"
            />
            <label for="segundaArea">Front-end</label>
            <input
              type="checkbox"
              name="terceira_area"
              id="terceiraArea"
              value="Fullstack"
            />
            <label for="terceiraArea">Fullstack</label>
          </div>

          <div>
            <!-- Select -->
            <label for="anosExperiencia">Anos de Experiência: </label>
            <select name="anosExperiencia" id="anosExperiencia">
              <option value="primeiraOpcao" selected>Nenhuma</option>
              <option value="segundaOpcao">1 - 3 ano(s)</option>
              <option value="terceiraOpcao" size="3">3 - 5 anos</option>
            </select>
          </div>
          <div>
            <label for="curriculumVitae">Curriculum Vitae: </label>
            <input
              type="file"
              name="curriculumVitae"
              id="curriculumVitae"
              required
            />
          </div>
          <button type="submit">Submeter</button>
        </form>
      </section>
    </main>
  </body>
</html>
